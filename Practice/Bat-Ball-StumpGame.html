<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            text-align: center;
        }


        .btn {

            padding: 10px;
            margin: 10px;
            cursor: pointer;
            border: none;
            background-color: rgb(68, 207, 68);
            border-radius: 5px;
        }

        .btn:active {
            transform: scale(0.95);
        }
        .btn:active {
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
        }
    </style>
</head>

<body>
    <h1>Bat Ball Stump Game</h1>
    <div class="btnClass">
        <button onclick="Choosen('Bat')" class="btn"><img src="images/Bat.jpg" alt="Bat"></button>
        <button onclick="Choosen('Ball')" class="btn"><img src="images/Ball.jpg" alt="Ball"></button>
        <button onclick="Choosen('Stump')" class="btn"><img src="images/wicket.jpg" alt="Stump"></button>
    </div>
    <button onclick="reset()">Reset</button>
    <p id="choose"></p>
    <script>
        let score;
        let scoreStr = localStorage.getItem('Score');
        resetScore();

        function resetScore() {
            scoreStr = localStorage.getItem('Score');
            score = JSON.parse(scoreStr) || {
                win: 0,
                loss: 0,
                tie: 0

            }
            score.displayScore = function () {
                return `No of matches won:${score.win} ,Lost: ${score.loss} and Tie: ${score.tie}`;

            }
        }
        function reset() {
            localStorage.clear();
            // scoreStr = localStorage.getItem('Score');
            // resetScore(scoreStr);
            resetScore();
            setValue();
            document.querySelector('#choose').innerText = `${score.displayScore()}`;

        }
        function randomNumber() {
            let randomNo = Math.random() * 3;
            let cmp;
            if (randomNo >= 0 && randomNo < 1) {

                return 'Bat';
            }
            else if (randomNo >= 1 && randomNo < 2) {
                return 'Ball';
            }
            else {
                return 'Stump';
            }
        }
        function Choosen(yourChoice) {
            let cmpChoice = randomNumber();
            if (yourChoice == 'Bat') {
                if (cmpChoice === 'Ball') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Bat') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            }
            else if (yourChoice == 'Ball') {
                if (cmpChoice === 'Stump') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Ball') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            } else {
                if (cmpChoice === 'Bat') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Stump') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            }
            printResult(yourChoice, cmpChoice, result);
        }
        function setValue() {
            localStorage.setItem('Score', JSON.stringify(score));
        }
        function printResult(yourChoice, cmpChoice, result) {
            setValue();
            document.querySelector('#choose').innerText = `Your choice is ${yourChoice} computer choice is ${cmpChoice}. ${result}. ${score.displayScore()}`;
        }
    </script>
</body>

</html>
