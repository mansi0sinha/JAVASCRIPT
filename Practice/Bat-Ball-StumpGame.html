<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Bat Ball Stump Game</h1>
    <button onclick="Choosen('Bat')">Bat</button>
    <button onclick="Choosen('Ball')">Ball</button>
    <button onclick="Choosen('Stump')">Stump</button>
    <button onclick="reset()">Reset</button>
    <p id="choose"></p>
    <script>
        let score;
        let scoreStr = localStorage.getItem('Score');
        resetScore(scoreStr);

        function resetScore(scoreStr) {
            score = JSON.parse(scoreStr) || {
                win: 0,
                loss: 0,
                tie: 0

            }
            score.displayScore = function () {
                return `No of matches won:${score.win} ,Lost: ${score.loss} and Tie: ${score.tie}`;

            }
        }
        function reset() {
            localStorage.clear();
            resetScore(scoreStr);
            setValue();
            document.querySelector('#choose').innerText = `${score.displayScore()}`;

        }
        function randomNumber() {
            let randomNo = Math.random() * 3;
            let cmp;
            if (randomNo >= 0 && randomNo < 1) {

                return 'Bat';
            }
            else if (randomNo >= 1 && randomNo < 2) {
                return 'Ball';
            }
            else {
                return 'Stump';
            }
        }
        function Choosen(yourChoice) {
            let cmpChoice = randomNumber();
            if (yourChoice == 'Bat') {
                if (cmpChoice === 'Ball') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Bat') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            }
            else if (yourChoice == 'Ball') {
                if (cmpChoice === 'Stump') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Ball') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            } else {
                if (cmpChoice === 'Bat') {
                    score.win++;
                    result = "You won.";
                }
                else if (cmpChoice == 'Stump') {
                    score.tie++;
                    result = "Its a tie";
                }
                else {
                    score.loss++;
                    result = "Computer won";
                }
            }
            printResult(yourChoice, cmpChoice, result);
        }
        function setValue() {
            localStorage.setItem('Score', JSON.stringify(score));
        }
        function printResult(yourChoice, cmpChoice, result) {
            setValue();
            document.querySelector('#choose').innerText = `Your choice is ${yourChoice} computer choice is ${cmpChoice}. ${result}. ${score.displayScore()}`;
        }
    </script>
</body>

</html>
