<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Function</title>
    <style>
        .btn-subscribe {
            font-size: 15px;
            height: 20px;
            width: 80px;
            background-color: rgb(178, 37, 37);
            color: white;
            border: none;
           
        }

        .size-double {
            font-size: 40px;
            height: 40px;
            width: 200px;
        }
    </style>
</head>

<body>
    <button class="btn-subscribe">Subscribe</button>
    <script>
        let buttonElement = document.querySelector(".btn-subscribe");
        buttonElement.addEventListener("click", event =>
            setTimeout(doubleTheSize, 2000));
        function doubleTheSize() {

            buttonElement.classList.add("size-double");
        }
        let multiply = (num1, num2) => (num1 * num2);
        console.log(multiply(9, 9));
        let printGreeting = () => console.log("Namaste");
        let runTwice = inputFunction => {
            inputFunction();
            inputFunction();
        };
        console.log(runTwice(printGreeting));
        let arr = [1, 2, 3, 4, 5, 6, 7, 9, 0, 7, 5, 4];
        let sum = 0;
        arr.forEach(num => sum += num);
        console.log(sum);
        let square = arr.map(num => num * num);
        console.log(square);
    </script>
</body>

</html>
