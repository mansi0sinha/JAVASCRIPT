<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div id="calculator">
        <input type="text" id="display" readonly></br>
        <div class="btn-container">
            <button class="cal-btn" onclick="clearDisplay() ">C</button>
            <button class="cal-btn" onclick="processInput('1')">1</button>
            <button class="cal-btn" onclick="processInput('2')">2</button></br>
            <button class="cal-btn" onclick="processInput('+')">+</button>
            <button class="cal-btn" onclick="processInput('3')">3</button>
            <button class="cal-btn" onclick="processInput('4')">4</button></br>
            <button class="cal-btn" onclick="processInput('-')">-</button>
            <button class="cal-btn" onclick="processInput('5')">5</button>
            <button class="cal-btn" onclick="processInput('6')">6</button></br>
            <button class="cal-btn" onclick="processInput('*')">*</button>
            <button class="cal-btn" onclick="processInput('7')">7</button>
            <button class="cal-btn" onclick="processInput('8')">8</button></br>
            <button class="cal-btn" onclick="processInput('/')">/</button>
            <button class="cal-btn" onclick="result()">=</button>
            <button class="cal-btn" onclick="processInput('9')">9</button></br>
            <button class="cal-btn" onclick="processInput('0')">0</button>
            <button class="cal-btn" onclick="processInput('.')">.</button>
        </div>
    </div>
    <script>
        let currentDisplay = '';
        function processInput(currentEle) {
            currentDisplay += currentEle;
            document.querySelector('#display').value = currentDisplay;
        }
        function clearDisplay(){
            currentDisplay = '';
           document.querySelector('#display').value =currentDisplay;
        }
        function result(){
            let result_value=eval(currentDisplay)
           document.querySelector('#display').value =result_value;
        }
    </script>
</body>

</html>
